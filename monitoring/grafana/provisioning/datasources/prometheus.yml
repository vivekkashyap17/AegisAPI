# Grafana datasource provisioning — wires Grafana to Prometheus automatically
# on startup so no manual clicking is needed. (Phase 8, slice 3.)
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: aegis-prometheus     # referenced by the provisioned dashboard's panels
    access: proxy
    # In the Phase 10 docker-compose stack, Prometheus is the service `prometheus`
    # on the shared network — reachable by name, no host hop.
    url: http://prometheus:9090
    isDefault: true
    editable: true
