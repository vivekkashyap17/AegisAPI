# Grafana dashboard provisioning — loads any dashboard JSON found in the mounted
# path on startup. (Phase 8, slice 3.)
apiVersion: 1

providers:
  - name: AegisAPI
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
