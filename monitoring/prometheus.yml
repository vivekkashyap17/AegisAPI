# Prometheus scrape configuration for AegisAPI.
#
# Prometheus scrapes the FastAPI app's /metrics endpoint. In the Phase 10
# docker-compose stack the app is a service named `app` on the shared network,
# so the target is `app:8000` (resolved by compose DNS — no host hop needed).

global:
  scrape_interval: 15s      # how often to pull /metrics
  evaluation_interval: 15s  # how often to evaluate alert rules

# Alerting rules (slice 3). Mounted into the container at this path.
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # The AegisAPI application itself.
  - job_name: aegisapi
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: aegisapi

  # Prometheus scraping its own metrics — a cheap liveness sanity check.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
