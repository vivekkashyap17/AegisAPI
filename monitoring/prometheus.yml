# Prometheus scrape configuration for AegisAPI (Phase 8, slice 2).
#
# Prometheus runs as a container and scrapes the FastAPI app's /metrics endpoint.
# The app runs on the host (uvicorn), so the target is host.docker.internal,
# which resolves to the host gateway when the container is started with
#   --add-host=host.docker.internal:host-gateway
#
# When the app is later containerised (Phase 10, docker-compose), swap the
# target to the app's service name (e.g. "backend:8000") on the shared network.

global:
  scrape_interval: 15s      # how often to pull /metrics
  evaluation_interval: 15s  # how often to evaluate alert rules (added in slice 3)

scrape_configs:
  # The AegisAPI application itself.
  - job_name: aegisapi
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: aegisapi

  # Prometheus scraping its own metrics — a cheap liveness sanity check.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
