# AegisAPI console — "Slate & Sky" theme (Phase 11).
[theme]
base = "dark"
primaryColor = "#38bdf8"              # sky-blue accent
backgroundColor = "#0f172a"           # slate-900 ground
secondaryBackgroundColor = "#1e293b"  # slate-800 panels / inputs
textColor = "#e2e8f0"                 # slate-200

[server]
headless = true
address = "0.0.0.0"
port = 8501

[browser]
gatherUsageStats = false
