# AegisAPI stack — Phase 10.
#   slice 1: app + Postgres + Redis on a private network.
#   slice 2: Nginx gateway + Prometheus + Grafana folded in.
#   slice 3: Kafka broker + event producer (app) + alert consumer (this slice).
#
# Bring it up from the repo root:  docker compose up --build
# Services reach each other by name over the default compose network — no more
# localhost:5433 / host.docker.internal hops. Only the edge (Nginx) and the ops
# UIs (Prometheus, Grafana) are published to the host; the app, Postgres, and
# Redis are internal-only — all app traffic is forced through the gateway.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegisapi
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegisapi"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Event-streaming backbone (Phase 10, slice 3). Single-node Kafka in KRaft
  # mode — no Zookeeper. Storage is ephemeral (events are transient for the demo).
  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Hosts are now compose service names, resolved on the private network.
      DATABASE_URL: postgresql+asyncpg://aegis:aegis@postgres:5432/aegisapi
      SYNC_DATABASE_URL: postgresql://aegis:aegis@postgres:5432/aegisapi
      REDIS_URL: redis://redis:6379
      APP_NAME: AegisAPI
      JWT_ALGORITHM: RS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      # Enables the Kafka producer; unset elsewhere (host/tests) => no-op.
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      # RS256 keys stay out of the image — mounted read-only from the host.
      - ./backend/app/core/keys:/app/app/core/keys:ro
    # No host port: the app is internal-only, reached through the Nginx gateway.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Alert consumer (Phase 10, slice 3): same image as the app, reads the
  # security-events stream and reacts independently of the request path.
  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.workers.alert_consumer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # Edge gateway (Phase 9): TLS termination, rate limiting, IP denylist.
  # Now proxies to the `app` service by name instead of host.docker.internal.
  nginx:
    image: nginx:latest
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/denylist.conf:/etc/nginx/denylist.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

  # Observability (Phase 8): scrapes app:8000/metrics, evaluates alert rules.
  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - app
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  # Security Operations Console (Phase 11): Streamlit UI. Calls the app directly
  # over the internal network (server-side, so no CORS / no browser-held JWT).
  dashboard:
    build:
      context: ./dashboard
    environment:
      API_BASE_URL: http://app:8000
    ports:
      - "8501:8501"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  pg-data:
  prometheus-data:
  grafana-data:
