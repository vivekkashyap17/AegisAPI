# AegisAPI stack — Phase 10.
#   slice 1: app + Postgres + Redis on a private network.
#   slice 2: Nginx gateway + Prometheus + Grafana folded in (this slice).
#   slice 3: Kafka event streaming joins next.
#
# Bring it up from the repo root:  docker compose up --build
# Services reach each other by name over the default compose network — no more
# localhost:5433 / host.docker.internal hops. Only the edge (Nginx) and the ops
# UIs (Prometheus, Grafana) are published to the host; the app, Postgres, and
# Redis are internal-only — all app traffic is forced through the gateway.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegisapi
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegisapi"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Hosts are now compose service names, resolved on the private network.
      DATABASE_URL: postgresql+asyncpg://aegis:aegis@postgres:5432/aegisapi
      SYNC_DATABASE_URL: postgresql://aegis:aegis@postgres:5432/aegisapi
      REDIS_URL: redis://redis:6379
      APP_NAME: AegisAPI
      JWT_ALGORITHM: RS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
    volumes:
      # RS256 keys stay out of the image — mounted read-only from the host.
      - ./backend/app/core/keys:/app/app/core/keys:ro
    # No host port: the app is internal-only, reached through the Nginx gateway.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Edge gateway (Phase 9): TLS termination, rate limiting, IP denylist.
  # Now proxies to the `app` service by name instead of host.docker.internal.
  nginx:
    image: nginx:latest
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/denylist.conf:/etc/nginx/denylist.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

  # Observability (Phase 8): scrapes app:8000/metrics, evaluates alert rules.
  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - app
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  pg-data:
  prometheus-data:
  grafana-data:
