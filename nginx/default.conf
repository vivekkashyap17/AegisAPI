# AegisAPI edge gateway — Phase 9, slice 1 (reverse proxy).
#
# Nginx is the single public entrypoint. Every request lands here first and is
# proxied to the FastAPI app (uvicorn) running on the host. This slice only
# establishes the gateway + honest client-IP forwarding; network-level rate
# limiting / IP reputation (slice 2) and TLS termination (slice 3) come next.

upstream aegis_app {
    # The app runs on the host; the container reaches it via the host-gateway
    # alias (see the `--add-host` flag in nginx/README.md).
    server host.docker.internal:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Edge-level health check answered by Nginx itself — it never touches the
    # app, so an upstream load balancer can confirm the gateway is alive even if
    # the backend is down.
    location = /gateway-health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"gateway healthy"}';
    }

    location / {
        proxy_pass http://aegis_app;

        # Preserve the original request context. The app doesn't rely on the
        # socket IP today (it scores the ip_address in the request body), but
        # forwarding these keeps access logs honest and is required once slice 2
        # rate-limits by real client IP.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Keepalive to the upstream needs HTTP/1.1 with the hop-by-hop
        # Connection header cleared.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
