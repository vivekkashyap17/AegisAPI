# AegisAPI edge gateway — Phase 9.
#   slice 1: reverse proxy + client-IP forwarding.
#   slice 2: network-level rate limiting + IP reputation.
#   slice 3: TLS termination + hardened security headers (this slice).
#
# Nginx is the single public entrypoint. Coarse, cheap defenses live here so a
# volumetric flood or a known-bad IP is turned away before it ever costs the
# Python app a risk-scoring / ML / DB cycle. The app's adaptive per-user policy
# engine (Phases 4/7) still runs behind this for everything that gets through.
# TLS is terminated here: clients speak HTTPS to the edge; the edge speaks plain
# HTTP to the app over the private host hop.

# --- Rate-limit zones (slice 2) ---------------------------------------------
# Keyed by client IP ($binary_remote_addr is compact — ~16 bytes/entry, so 10m
# tracks ~160k unique IPs). `req` caps request rate; `conn` caps concurrent
# connections from a single IP.
limit_req_zone  $binary_remote_addr zone=aegis_req:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=aegis_conn:10m;

# Turned-away traffic gets 429 Too Many Requests (Nginx defaults to 503, which
# wrongly implies the server is broken rather than the client being throttled).
limit_req_status  429;
limit_conn_status 429;

upstream aegis_app {
    # The app runs on the host; the container reaches it via the host-gateway
    # alias (see the `--add-host` flag in nginx/README.md).
    server host.docker.internal:8000;
    keepalive 32;
}

# --- HTTP :80 — redirect everything to HTTPS (slice 3) ----------------------
server {
    listen 80;
    server_name _;

    # Health check answered over plain HTTP too, so load balancers / probes can
    # reach it without following the redirect.
    location = /gateway-health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"gateway healthy"}';
    }

    # Everything else is bounced to HTTPS. 301 = permanent.
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 — TLS termination + real serving (slice 3) ------------------
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Dev cert is self-signed and NOT committed (see nginx/README.md to generate).
    ssl_certificate     /etc/nginx/certs/aegis.crt;
    ssl_certificate_key /etc/nginx/certs/aegis.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # Hardened security headers, applied to every proxied response. `always`
    # sends them even on error responses. (A location with its own add_header
    # does not inherit these — that's fine for the health endpoint below.)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # IP reputation (slice 2): known-bad sources denied at the edge with 403.
    include /etc/nginx/denylist.conf;

    # Edge-level health check answered by Nginx itself — never touches the app
    # and is left un-rate-limited so health probes never trip it.
    location = /gateway-health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"gateway healthy"}';
    }

    location / {
        # Network-level rate limiting (slice 2). `burst=20` absorbs short spikes;
        # `nodelay` serves that burst immediately. Beyond it, excess gets 429.
        limit_req  zone=aegis_req burst=20 nodelay;
        limit_conn aegis_conn 20;

        proxy_pass http://aegis_app;

        # Preserve the original request context. X-Forwarded-Proto now reports
        # `https` so the app knows the client leg was encrypted.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Keepalive to the upstream needs HTTP/1.1 with Connection cleared.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
