# AegisAPI edge gateway — Phase 9.
#   slice 1: reverse proxy + client-IP forwarding.
#   slice 2: network-level rate limiting + IP reputation (this slice).
#   slice 3: TLS termination (next).
#
# Nginx is the single public entrypoint. Coarse, cheap defenses live here so a
# volumetric flood or a known-bad IP is turned away before it ever costs the
# Python app a risk-scoring / ML / DB cycle. The app's adaptive per-user policy
# engine (Phases 4/7) still runs behind this for everything that gets through.

# --- Rate-limit zones (slice 2) ---------------------------------------------
# Keyed by client IP ($binary_remote_addr is compact — ~16 bytes/entry, so 10m
# tracks ~160k unique IPs). `req` caps request rate; `conn` caps concurrent
# connections from a single IP.
limit_req_zone  $binary_remote_addr zone=aegis_req:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=aegis_conn:10m;

# Turned-away traffic gets 429 Too Many Requests (Nginx defaults to 503, which
# wrongly implies the server is broken rather than the client being throttled).
limit_req_status  429;
limit_conn_status 429;

upstream aegis_app {
    # The app runs on the host; the container reaches it via the host-gateway
    # alias (see the `--add-host` flag in nginx/README.md).
    server host.docker.internal:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # IP reputation (slice 2): known-bad sources are denied here, at the edge,
    # with 403 — before any proxying, rate-limit accounting, or app work.
    # Edit nginx/denylist.conf and reload to change the list.
    include /etc/nginx/denylist.conf;

    # Edge-level health check answered by Nginx itself — never touches the app,
    # and is deliberately left un-rate-limited so health probes never trip it.
    location = /gateway-health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"gateway healthy"}';
    }

    location / {
        # Network-level rate limiting (slice 2). `burst=20` absorbs short spikes
        # by queuing; `nodelay` serves that burst immediately instead of pacing
        # it out. Beyond the burst, excess requests get 429. `limit_conn` caps
        # simultaneous connections per IP to blunt slow-drip connection floods.
        limit_req  zone=aegis_req burst=20 nodelay;
        limit_conn aegis_conn 20;

        proxy_pass http://aegis_app;

        # Preserve the original request context (see slice 1). Required now that
        # rate limiting keys on the real client IP.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Keepalive to the upstream needs HTTP/1.1 with Connection cleared.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
