# AegisAPI IP reputation denylist — Phase 9, slice 2.
#
# One rule per line. Requests from these sources are rejected at the edge with
# 403 Forbidden before reaching the app. Supports single IPs and CIDR ranges:
#
#   deny 203.0.113.10;
#   deny 198.51.100.0/24;
#
# After editing, reload without downtime:
#   docker exec aegis-nginx nginx -s reload
#
# The list is empty by default (nothing denied). Add offending IPs as you
# identify them — e.g. sources the app repeatedly QUARANTINEs. (Automatically
# feeding the app's verdicts into this file is a deliberate later enhancement,
# not part of Phase 9.)
